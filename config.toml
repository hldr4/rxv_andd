enable-module-update = true # set this to false if you do not want to receive updates for the module
parallel-jobs = 1

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config

[YouTube]
patches-source = "anddea/revanced-patches"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
module-prop-name = "YT-RVX"
rv-brand = "RVX anddea"
build-mode = "both"
arch = "arm64-v8a"
riplib = true
#apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
#archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
included-patches = "'Custom branding icon for YouTube' 'Custom branding name for YouTube' 'Custom branding' 'Force player buttons background' 'Hide animated button background' 'Hide double tap to like animations' 'Hide voice search button' 'Theme'"
excluded-patches = "'Append time stamps information' 'Custom header for YouTube' 'Spoof sreaming data' 'Custom double tap length' 'Custom package name' 'Enable wide search bar' 'Keep landscape mode' 'Layout switch' 'Translations for YouTube' 'Change player flyout panel toggles'"
# version = "19.16.39"
patcher-args = """\
  -OappIcon='Revancify Red' \
  -OdarkThemeBackgroundColor='@android:color/black' \
  -OappName='YouTube' \
  -OBackgroundColor='android:color/transparent' \
  -OcustomName='YouTube' \
  -OcustomIcon='Revancify Red' \
  """

[Music]
enabled = false
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
rv-brand = "RVX-Music anddea"
arch = "arm64-v8a"
riplib = true
build-mode = "both"
module-prop-name = "YTM-RVX"
included-patches = "'Custom branding icon for YouTube Music' 'Settings for YouTube Music' 'Custom branding name for YouTube Music' 'Hide voice search button'"
excluded-patches = "'Certificate spoof' 'Custom package name' 'Custom playback speed' 'Custom header for YouTube Music' 'Translations' 'Enable old player layout' 'Enable old player background' 'Enable old style miniplayer' 'Enable color match player' 'Enable zen mode'"
